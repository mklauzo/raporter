services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql+pymysql://raporter:password@db/raporter
      - SECRET_KEY=${SECRET_KEY:-supersecretkey123}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./raport_servera.sh:/app/raport_servera.sh:ro
    restart: unless-stopped

  db:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=raporter
      - MYSQL_USER=raporter
      - MYSQL_PASSWORD=password
    volumes:
      - db_data:/var/lib/mysql
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
